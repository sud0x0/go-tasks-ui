name: release

on:
  push:
    tags:
      - 'v*'

# Default to read-only at the workflow level. Each job widens permissions
# only for what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # publish GitHub Releases
      id-token: write   # OIDC for SLSA provenance signing
    outputs:
      hashes: ${{ steps.subjects.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so the changelog can compare against the previous tag

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec svelte-check --tsconfig ./tsconfig.app.json

      - name: Build static bundle
        run: pnpm build

      # Bundle the static assets together with the Caddyfile so the tarball is
      # drop-in deployable: extract, set SITE_ADDRESS / API_UPSTREAM, run caddy.
      - name: Package release tarball
        id: bundle
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="go-tasks-ui-${VERSION}.tar.gz"
          STAGE="go-tasks-ui-${VERSION}"
          mkdir -p "$STAGE/dist"
          cp -R dist/. "$STAGE/dist/"
          cp Caddyfile "$STAGE/"
          tar -czf "$TARBALL" "$STAGE"
          {
            echo "version=$VERSION"
            echo "tarball=$TARBALL"
          } >> "$GITHUB_OUTPUT"

      # SBOM of the production dependency closure. Run against the project
      # rather than the tarball so syft sees package.json + the lockfile and
      # can attribute every JS package shipped in the bundle.
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.22.0

      - name: Generate SBOM
        run: |
          set -euo pipefail
          VERSION="${{ steps.bundle.outputs.version }}"
          syft scan dir:. \
            --source-name "go-tasks-ui" \
            --source-version "$VERSION" \
            -o spdx-json="go-tasks-ui-${VERSION}.sbom.json"

      - name: Generate checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.bundle.outputs.version }}"
          sha256sum \
            "${{ steps.bundle.outputs.tarball }}" \
            "go-tasks-ui-${VERSION}.sbom.json" \
            > checksums.txt

      # SLSA generic-generator subject format: lines of "<sha256>  <filename>",
      # base64-encoded. Emit subjects for the tarball *and* the SBOM so each
      # asset gets its own provenance entry in the published intoto file.
      - name: Compute SLSA subjects
        id: subjects
        run: |
          set -euo pipefail
          VERSION="${{ steps.bundle.outputs.version }}"
          HASHES=$(sha256sum \
            "${{ steps.bundle.outputs.tarball }}" \
            "go-tasks-ui-${VERSION}.sbom.json" \
            | base64 -w0)
          if [ -z "$HASHES" ]; then
            echo "::error title=Empty hashes::sha256sum produced no output"
            exit 1
          fi
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Append GitHub's auto-generated "What's Changed" + "Full Changelog"
          # section to the static body below. Generated server-side from PRs
          # merged since the previous tag — no commit-history checkout needed.
          generate_release_notes: true
          files: |
            ${{ steps.bundle.outputs.tarball }}
            go-tasks-ui-${{ steps.bundle.outputs.version }}.sbom.json
            checksums.txt
          body: |
            ## go-tasks-ui ${{ github.ref_name }}

            Static bundle of the production build. Extract the tarball, set the
            two env vars below, and run Caddy from the unpacked directory:

            ```bash
            tar -xzf go-tasks-ui-${{ steps.bundle.outputs.version }}.tar.gz
            cd go-tasks-ui-${{ steps.bundle.outputs.version }}
            export SITE_ADDRESS=tasks.example.com
            export API_UPSTREAM=api.internal:8080
            export ACME_EMAIL=ops@example.com
            caddy run --config Caddyfile
            ```

            Caddy provisions and renews TLS via Let's Encrypt automatically as
            long as `SITE_ADDRESS` resolves to the host on ports 80 + 443.

            The SBOM (`go-tasks-ui-${{ steps.bundle.outputs.version }}.sbom.json`,
            SPDX-JSON) covers the JavaScript dependency closure shipped in the
            bundle. Verify downloads with `sha256sum -c checksums.txt`.

  # SLSA Level 3 build provenance for the tarball and SBOM. Attaches a
  # `<release>.intoto.jsonl` file to the GitHub Release.
  binary-provenance:
    needs: [release]
    permissions:
      actions: read       # read workflow run metadata
      id-token: write     # OIDC for the SLSA generator's signer
      contents: write     # upload the provenance file to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
