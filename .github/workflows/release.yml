name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push the container image to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec svelte-check --tsconfig ./tsconfig.app.json

      - name: Build static bundle
        run: pnpm build

      - name: Package static bundle
        id: bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="go-tasks-ui-${VERSION}.tar.gz"
          tar -czf "$TARBALL" -C dist .
          {
            echo "version=$VERSION"
            echo "tarball=$TARBALL"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle.outputs.tarball }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
