# ============================================================================
# THIS IS FOR LOCAL DEVELOPMENT ONLY
# ============================================================================
# Requires .env file with secrets - see .env.example

services:
  app:
    build:
      context: .
      dockerfile: container.dev
    container_name: app_ui
    volumes:
      - .:/app:Z
      - node_modules:/app/node_modules:Z
    ports:
      - '3000:3000'
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_API_TARGET: ${VITE_API_BASE_URL}
    command: pnpm dev

volumes:
  node_modules:
