repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm exec eslint --fix
        language: system
        files: \.(ts|svelte)$

      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        files: \.(ts|svelte|json|md|yaml)$

      - id: svelte-check
        name: svelte-check
        entry: pnpm exec svelte-check --tsconfig ./tsconfig.json
        language: system
        files: \.(ts|svelte)$
        pass_filenames: false

  - repo: https://github.com/semgrep/pre-commit
    rev: v1.156.0
    hooks:
      - id: semgrep
        args:
          - --config=auto
          - --error
          - --skip-unknown-extensions
